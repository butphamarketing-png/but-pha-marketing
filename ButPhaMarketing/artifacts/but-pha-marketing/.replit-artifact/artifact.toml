kind = "web"
previewPath = "/"
title = "Bứt Phá Marketing"
version = "1.0.0"
id = "artifacts/but-pha-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26244

[services.development]
run = "pnpm --filter @workspace/but-pha-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/but-pha-marketing", "run", "build" ]
publicDir = "artifacts/but-pha-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26244"
BASE_PATH = "/"
